name: Daily Fetch

on:
  schedule:
    - cron: '7 17 * * *'    # 01:07 Beijing time (primary)
    - cron: '23 19 * * *'   # 03:23 Beijing time (retry 1)
    - cron: '41 21 * * *'   # 05:41 Beijing time (retry 2)
    - cron: '13 0 * * *'    # 08:13 Beijing time (retry 3)
  workflow_dispatch:

# cancel-in-progress: true so a newer run supersedes a stuck/old one instead of
# piling up behind it. The previous setting (false) + the github-pages deploy
# hanging on its environment caused every run since ~2026-05-30 to be cancelled
# with "a higher priority waiting request exists", so nothing ever committed.
concurrency:
  group: daily-fetch
  cancel-in-progress: true

jobs:
  # Single job: fetch + commit + push. No `environment:` binding, so nothing
  # here can hang waiting on GitHub Pages environment protection rules.
  #
  # Site deployment is handled automatically by GitHub's branch-based Pages
  # (the "pages-build-deployment" workflow), which redeploys whenever this job
  # pushes to main. The old actions/deploy-pages job was removed because it was
  # redundant with branch-based Pages and was the step that stalled the run.
  # NOTE: if the live site ever stops updating after a push, check
  # Settings -> Pages: the source should be "Deploy from a branch" (main).
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Fetch and summarize articles
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
        run: node scripts/fetch.js

      - name: Commit and push
        run: |
          git config user.name "daily-reads-bot"
          git config user.email "bot@daily-reads"
          git add data/ public/data/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "update: $(date +%Y-%m-%d) daily articles"
            git push
          fi

      # Keepalive: GitHub auto-disables scheduled workflows after 60 days with
      # no repository activity. This keeps the schedule from being suspended.
      - name: Keepalive
        uses: gautamkrishnar/keepalive-workflow@v2
