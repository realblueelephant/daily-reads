name: Daily Fetch

on:
  schedule:
    - cron: '7 17 * * *'    # 01:07 Beijing time (primary)
    - cron: '23 19 * * *'   # 03:23 Beijing time (retry 1)
    - cron: '41 21 * * *'   # 05:41 Beijing time (retry 2)
    - cron: '13 0 * * *'    # 08:13 Beijing time (retry 3)
  workflow_dispatch:

concurrency:
  group: daily-fetch
  cancel-in-progress: false

jobs:
  # Job 1: fetch + commit. This is the part that MUST run every day.
  # It has no environment binding, so nothing here can be blocked by
  # GitHub Pages environment protection rules.
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Fetch and summarize articles
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
        run: node scripts/fetch.js

      - name: Commit and push
        id: commit
        run: |
          git config user.name "daily-reads-bot"
          git config user.email "bot@daily-reads"
          git add data/ public/data/
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit."
          else
            git commit -m "update: $(date +%Y-%m-%d) daily articles"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Keepalive: GitHub auto-disables scheduled workflows after 60 days with
      # no repository activity, and commits pushed by GITHUB_TOKEN do not
      # reliably count. This re-commits the workflow file periodically so the
      # schedule is never suspended.
      - name: Keepalive
        uses: gautamkrishnar/keepalive-workflow@v2

  # Job 2: deploy to GitHub Pages. Runs after fetch. If this fails (e.g. Pages
  # source not set to "GitHub Actions"), the daily commit above is already done,
  # so the site still updates via branch-based Pages.
  deploy:
    needs: fetch
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
