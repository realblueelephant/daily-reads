name: Daily Fetch

on:
  schedule:
    - cron: '3 1 * * *'   # 09:03 Beijing time
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Fetch and summarize articles
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
        run: node scripts/fetch.js

      - name: Commit and push
        run: |
          git config user.name "daily-reads-bot"
          git config user.email "bot@daily-reads"
          git add data/ public/data/
          git diff --staged --quiet || git commit -m "update: $(date +%Y-%m-%d) daily articles"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
